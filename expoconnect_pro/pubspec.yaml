name: expoconnect_pro
description: "AI-Powered Business Expo Management, Networking & Lead Intelligence Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  path_provider: ^2.1.3
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0

  # State & Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # UI & Assets
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0
  smooth_page_indicator: ^1.2.0

  # Models & Utils
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  go_router_builder: ^2.7.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/lottie/
    - assets/illustrations/